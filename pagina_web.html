<!DOCTYPE html>
<html lang="cat">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Nou Mon</title>

    <!-- favicon -->
    <link rel="icon" type="image/x-icon" href="/img/rice.png">

    <!-- icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <style>

    /* ALL */
    :root{
        --color-principal:#8B1A10;
        --color-fosc:rgb(45, 43, 43);
        --color-clar:rgb(252, 238, 220);
        --mida-font:0.8rem;
    }

    body{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Gill Sans', Calibri, sans-serif;
    }

    /* NAV */
    .nav{
        position:fixed;
        top:0;
        width:100%;
        z-index:100;
    }

    .menu{
        display:flex;
        list-style:none;
        justify-content:flex-end;
        background-color: var(--color-fosc);
        gap: 1.8rem;
        margin: 0;
        padding:1.2rem;
    }

    .menu li a{
        text-decoration:none;
        color:white;
        font-size: var(--mida-font);
    }

    /* HEADER */
    #header{
        position:relative;
    }

    #header img{
        width:100%;
        opacity: 0.6;
    }

    .titol{
        position:absolute;
        top:50%;
        left:10%;
    }

    /* SECCIONS */
    section{
        padding:2.5rem;
    }

    /* SOBRE NOSALTRES */
    .nosaltres_container1,
    .nosaltres_container2{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap: 3rem;
        align-items:center;
    }

    .nosaltres_container1 img,
    .nosaltres_container2 img{
        width:100%;
        max-width:20rem;
    }

    /* CARTA */
    .carta_container{
        display:grid;
        grid-template-columns:35% 65%;
        grid-template-areas:
            "carta_menu carta_menu"
            "menu1 contingut1"
            "menu2 contingut2";
        gap:1.8rem;
    }

    .carta_menu{ grid-area:carta_menu; }
    .menu1{ grid-area:menu1; }
    .menu2{ grid-area:menu2; }
    .contingut1{ grid-area:contingut1; }
    .contingut2{ grid-area:contingut2; }

    .img_comida{
        display:flex;
        gap:1rem;
    }

    .img_comida div{
        flex:1;
    }

    .img_comida img{
        width:100%;
    }

    /* =======================
       GALERIA
    ======================= */
    .galeria_container{
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:0.5rem;
    }

    .galeria_container img{
        width:10rem;
    }

    /* =======================
       FORMULARI
    ======================= */
    #formulari{
        background-color:var(--color-clar);
    }

    .form_container{
        display:grid;
        grid-template-columns:40% 40%;
        grid-template-areas:
            "nom num"
            "data hora"
            "descripcio descripcio"
            "button button";
        gap:1rem;
        justify-content:center;
    }

    .nom{grid-area:nom;}
    .num{grid-area:num;}
    .data{grid-area:data;}
    .hora{grid-area:hora;}
    .descripcio{grid-area:descripcio;}

    input, textarea{
        width:100%;
        padding:0.5rem;
    }

    .button{
        grid-area:button;
        background-color:var(--color-principal);
        color:white;
        border:none;
        padding:1rem;
    }

    /* =======================
       FOOTER
    ======================= */
    .footer_container{
        display:flex;
        justify-content:space-between;
        padding:1rem;
        background-color:var(--color-fosc);
        color:white;
    }

    .logo img{
        width:3rem;
    }

    /* =======================
       BOTÓ FIX
    ======================= */
    .reservar{
        position:fixed;
        bottom:1rem;
        right:1rem;
        background-color:var(--color-principal);
        color:white;
        padding:1rem;
        text-decoration:none;
    }

    /* =======================
       TABLET (≤768px)
    ======================= */
    @media (max-width: 768px){

        .menu{
            justify-content:center;
        }

        .footer_container{
            flex-direction:column;
            text-align:center;
        }

        .logo{
            display:none;
        }
    }

    /* =======================
       MÒBIL (≤576px)
    ======================= */
    @media (max-width: 576px){

        /* NAV vertical */
        .menu{
            flex-direction:column;
            align-items:center;
        }

        /* SOBRE NOSALTRES */
        .nosaltres_container1,
        .nosaltres_container2{
            grid-template-columns:1fr;
        }

        /* CARTA */
        .carta_container{
            grid-template-columns:1fr;
            grid-template-areas:
                "carta_menu"
                "menu1"
                "contingut1"
                "menu2"
                "contingut2";
        }

        /* IMATGES */
        .img_comida{
            flex-direction:column;
        }

        /* GALERIA */
        .galeria_container{
            flex-direction:column;
        }

        .galeria_container img{
            width:100%;
        }

        /* FORMULARI (2 columnes com wireframe) */
        .form_container{
            grid-template-columns:1fr 1fr;
        }

        /* FOOTER */
        .footer_container{
            flex-direction:column;
            text-align:center;
        }

        .logo{
            display:none;
        }
    }

    </style>
</head>

<body>

<nav class="nav">
    <ul class="menu">
        <li><a href="#sobre_nosaltres">NOSALTRES</a></li>
        <li><a href="#carta">CARTA</a></li>
        <li><a href="#galeria">GALERIA</a></li>
    </ul>
</nav>

<header id="header">
    <img src="/img/restaurant.webp">
    <div class="titol">
        <h1>Restaurant ELS COBERTS</h1>
    </div>
</header>

<main>

<section id="sobre_nosaltres">
    <h2>Sobre Nosaltres</h2>
    <div class="nosaltres_container1">
        <img src="img/img1.png">
        <p>Lorem ipsum...</p>
    </div>
</section>

<section id="carta">
    <h2>Carta</h2>
    <div class="carta_container">
        <div class="carta_menu">Menú</div>

        <div class="menu1"><img src="/img/menu1.jpeg"></div>
        <div class="contingut1">Contingut</div>

        <div class="menu2"><img src="/img/menu2.jpeg"></div>
        <div class="contingut2">Contingut</div>
    </div>
</section>

<section id="galeria">
    <h2>Galeria</h2>
    <div class="galeria_container">
        <img src="/img/galeria.png">
        <img src="/img/galeria.png">
    </div>
</section>

<section id="formulari">
    <h2>Reserva</h2>
    <form>
        <div class="form_container">
            <div class="nom"><input type="text" placeholder="Nom"></div>
            <div class="num"><input type="number" placeholder="Persones"></div>
            <div class="data"><input type="date"></div>
            <div class="hora"><input type="time"></div>
            <div class="descripcio"><textarea></textarea></div>
            <button class="button">Reservar</button>
        </div>
    </form>
</section>

</main>

<footer>
    <div class="footer_container">
        <div>restaurant@gmail.com</div>
        <div>666 66 66 66</div>
        <div class="logo"><img src="/svg/rice.svg"></div>
    </div>
</footer>

<a href="#formulari" class="reservar">RESERVAR</a>

</body>
</html>
